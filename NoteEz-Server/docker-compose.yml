services:
  sql-noteez:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-noteez
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: NoteEz-Server/Dockerfile
    container_name: noteez-api
    depends_on:
      sql-noteez:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - ASPNETCORE_ENVIRONMENT=Development
      - AzureBlobStorage__ConnectionString=${AZURE_BLOB_CONNECTION_STRING}
      - AzureBlobStorage__ContainerName=${AZURE_BLOB_CONTAINER_NAME}
      - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGIN:-http://localhost:5173}
    ports:
      - "8080:8080"

volumes:
  sql_data: